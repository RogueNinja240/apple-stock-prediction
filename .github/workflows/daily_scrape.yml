name: Daily Data Ingestion Pipeline

# This schedules the workflow to run automatically
on:
  schedule:
    - cron: '0 1 * * 1-5' # Runs at 01:00 UTC, Monday through Friday
  workflow_dispatch: # Allows you to trigger it manually via GitHub UI

jobs:
  scrape_and_version:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # Required so the action can push commits back to the repo
          token: ${{ secrets.GITHUB_TOKEN }} 

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10' # Match your local version
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install dvc dvc[s3]

      - name: Configure DagsHub DVC Remote Authentication
        run: |
          dvc remote modify origin --local auth basic
          dvc remote modify origin --local user ${{ secrets.DAGSHUB_USERNAME }}
          dvc remote modify origin --local password ${{ secrets.DAGSHUB_TOKEN }}

      - name: Run Data Ingestion (DVC Repro)
        env:
          # Injecting your secret API keys into the runner environment
          NYT_KEY: ${{ secrets.NYT_KEY }}
          GNEWS_KEY: ${{ secrets.GNEWS_KEY }}
          GUARDIAN_KEY: ${{ secrets.GUARDIAN_KEY }}
          FINNHUB_KEY: ${{ secrets.FINNHUB_KEY }}
          ALPHAVANTAGE_KEY: ${{ secrets.ALPHAVANTAGE_KEY }}
        run: |
          dvc pull
          dvc repro 

      - name: Push new data to DagsHub
        run: dvc push

      - name: Commit updated DVC lockfile to GitHub
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add dvc.lock
          # Only commit if there are changes to avoid workflow errors
          git diff --quiet && git diff --staged --quiet || git commit -m "action: daily data ingestion update"
          git push